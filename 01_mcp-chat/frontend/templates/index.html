<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e5e5e5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
            margin-right: 6px;
        }

        .status-dot.offline { background: #ef4444; }

        /* Chat area */
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
        }

        .message.user {
            background: #1e40af;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.system {
            background: transparent;
            border: 1px dashed #333;
            color: #666;
            font-size: 12px;
            align-self: center;
            max-width: 100%;
            text-align: center;
        }

        /* Thinking indicator */
        .thinking {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        .thinking span {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #666;
            animation: bounce 1.2s infinite;
        }

        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        /* Input area */
        #input-area {
            padding: 16px 24px;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        #message-input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #e5e5e5;
            padding: 10px 14px;
            font-size: 14px;
            resize: none;
            min-height: 42px;
            max-height: 120px;
            outline: none;
            font-family: inherit;
            line-height: 1.5;
        }

        #message-input:focus { border-color: #3b82f6; }

        #send-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
        }

        #send-btn:hover { background: #1d4ed8; }
        #send-btn:disabled { background: #333; cursor: not-allowed; }

        #reset-btn {
            background: transparent;
            color: #666;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            cursor: pointer;
        }

        #reset-btn:hover { color: #e5e5e5; border-color: #444; }
    </style>
</head>
<body>

<header>
    <h1>{{ project_name }}</h1>
    <span id="status"><span class="status-dot" id="dot"></span><span id="status-text">연결 중...</span></span>
</header>

<div id="chat-area">
    <div class="message system">TODO: 여기에 서비스 소개 메시지를 입력하세요</div>
</div>

<div id="input-area">
    <button id="reset-btn" onclick="resetChat()">초기화</button>
    <textarea id="message-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">전송</button>
</div>

<script>
    const chatArea = document.getElementById('chat-area');
    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    // 헬스체크
    async function checkHealth() {
        try {
            const res = await fetch('/api/health');
            const data = await res.json();
            const online = data.mcp === 'connected';
            document.getElementById('dot').className = 'status-dot' + (online ? '' : ' offline');
            document.getElementById('status-text').textContent = online ? 'MCP 연결됨' : 'MCP 오프라인';
        } catch {
            document.getElementById('dot').className = 'status-dot offline';
            document.getElementById('status-text').textContent = '연결 오류';
        }
    }

    checkHealth();
    setInterval(checkHealth, 30000);

    // 메시지 추가
    function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.textContent = text;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return div;
    }

    // 로딩 표시
    function addThinking() {
        const div = document.createElement('div');
        div.className = 'thinking';
        div.innerHTML = '<span></span><span></span><span></span>';
        div.id = 'thinking';
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeThinking() {
        const el = document.getElementById('thinking');
        if (el) el.remove();
    }

    // 메시지 전송
    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.style.height = 'auto';
        sendBtn.disabled = true;

        addMessage(text, 'user');
        addThinking();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text }),
            });
            const data = await res.json();
            removeThinking();

            if (data.error) {
                addMessage('오류: ' + data.error, 'system');
            } else {
                addMessage(data.response, 'assistant');
            }
        } catch (e) {
            removeThinking();
            addMessage('네트워크 오류가 발생했습니다.', 'system');
        }

        sendBtn.disabled = false;
        input.focus();
    }

    // 대화 초기화
    async function resetChat() {
        await fetch('/api/reset', { method: 'POST' });
        chatArea.innerHTML = '<div class="message system">대화가 초기화되었습니다.</div>';
    }

    // Enter 전송
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // 텍스트 영역 자동 높이
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
</script>

</body>
</html>
