<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 12px 24px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        header h1 { font-size: 15px; font-weight: 600; }

        .status-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #22c55e;
        }

        /* Main layout */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Dashboard panel */
        .dashboard {
            width: 340px;
            flex-shrink: 0;
            border-right: 1px solid #1a1a1a;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
        }

        /* Card */
        .card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 10px;
            padding: 14px;
        }

        .card-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 6px;
        }

        .card-value {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }

        .card-sub {
            font-size: 12px;
            color: #555;
            margin-top: 4px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Status indicator */
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 13px;
        }

        .status-row:last-child { border-bottom: none; }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.ok { background: #14532d; color: #4ade80; }
        .badge.warn { background: #713f12; color: #fbbf24; }
        .badge.err { background: #7f1d1d; color: #f87171; }

        /* Refresh button */
        .refresh-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #666;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
        }

        .refresh-btn:hover { color: #e5e5e5; border-color: #444; }

        /* Chat panel */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            max-width: 78%;
            padding: 11px 15px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 13px;
            white-space: pre-wrap;
        }

        .message.user {
            background: #1d4ed8;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
        }

        .message.assistant {
            background: #111;
            border: 1px solid #1e1e1e;
            align-self: flex-start;
            border-bottom-left-radius: 3px;
        }

        .message.system {
            background: transparent;
            border: 1px dashed #222;
            color: #555;
            font-size: 12px;
            align-self: center;
            max-width: 100%;
            text-align: center;
        }

        .thinking {
            display: flex;
            gap: 4px;
            padding: 11px 15px;
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            border-bottom-left-radius: 3px;
            align-self: flex-start;
        }

        .thinking span {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #555;
            animation: bounce 1.2s infinite;
        }

        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
        }

        /* Input */
        #input-area {
            padding: 14px 20px;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #message-input {
            flex: 1;
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 8px;
            color: #e5e5e5;
            padding: 9px 13px;
            font-size: 13px;
            resize: none;
            min-height: 40px;
            max-height: 110px;
            outline: none;
            font-family: inherit;
            line-height: 1.5;
        }

        #message-input:focus { border-color: #2563eb; }

        #send-btn {
            background: #1d4ed8;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 9px 16px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
        }

        #send-btn:hover { background: #1e40af; }
        #send-btn:disabled { background: #222; cursor: not-allowed; }

        #reset-btn {
            background: transparent;
            color: #555;
            border: 1px solid #1e1e1e;
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 12px;
            cursor: pointer;
        }

        #reset-btn:hover { color: #e5e5e5; }
    </style>
</head>
<body>

<header>
    <h1>{{ project_name }}</h1>
    <span class="status-badge" id="header-status">● 연결 중...</span>
</header>

<div class="main">

    <!-- 대시보드 패널 -->
    <div class="dashboard">
        <div class="panel-title">실시간 대시보드</div>

        <!-- TODO: 도메인에 맞는 카드로 교체 -->
        <div class="card-grid">
            <div class="card">
                <div class="card-label">TODO 지표 1</div>
                <div class="card-value" id="metric-1">—</div>
                <div class="card-sub" id="metric-1-sub">로딩 중...</div>
            </div>
            <div class="card">
                <div class="card-label">TODO 지표 2</div>
                <div class="card-value" id="metric-2">—</div>
                <div class="card-sub" id="metric-2-sub">로딩 중...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-label">TODO 상태 목록</div>
            <!-- TODO: 실제 상태 항목으로 교체 -->
            <div class="status-row">
                <span>항목 A</span>
                <span class="badge ok" id="status-a">정상</span>
            </div>
            <div class="status-row">
                <span>항목 B</span>
                <span class="badge warn" id="status-b">주의</span>
            </div>
        </div>

        <!-- MCP 서버 연결 상태 -->
        <div class="card">
            <div class="card-label">MCP 서버 상태</div>
            <div id="mcp-status-list">확인 중...</div>
        </div>

        <button class="refresh-btn" onclick="loadDashboard()">↻ 새로고침</button>
    </div>

    <!-- 채팅 패널 -->
    <div class="chat-panel">
        <div id="chat-area">
            <div class="message system">TODO: 서비스 소개 메시지를 여기에 입력하세요</div>
        </div>

        <div id="input-area">
            <button id="reset-btn" onclick="resetChat()">초기화</button>
            <textarea id="message-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
            <button id="send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>
</div>

<script>
    const chatArea = document.getElementById('chat-area');
    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    // 대시보드 데이터 로드
    // TODO: 응답 데이터 구조에 맞게 수정
    async function loadDashboard() {
        try {
            const res = await fetch('/api/dashboard');
            if (!res.ok) throw new Error();
            const data = await res.json();

            // TODO: 실제 데이터 필드로 교체
            document.getElementById('metric-1').textContent = data.metric1 ?? '—';
            document.getElementById('metric-1-sub').textContent = data.metric1_label ?? '';
            document.getElementById('metric-2').textContent = data.metric2 ?? '—';
            document.getElementById('metric-2-sub').textContent = data.metric2_label ?? '';

        } catch {
            console.warn('대시보드 데이터 로드 실패');
        }
    }

    // MCP 서버 상태 확인
    async function checkHealth() {
        try {
            const res = await fetch('/api/health');
            const data = await res.json();

            const servers = data.mcp_servers || {};
            const allOk = Object.values(servers).every(s => s === 'connected');
            document.getElementById('header-status').textContent = allOk ? '● 정상' : '● 일부 오프라인';
            document.getElementById('header-status').style.color = allOk ? '#22c55e' : '#f59e0b';

            const list = document.getElementById('mcp-status-list');
            list.innerHTML = Object.entries(servers).map(([k, v]) =>
                `<div class="status-row">
                    <span>${k}</span>
                    <span class="badge ${v === 'connected' ? 'ok' : 'err'}">${v}</span>
                </div>`
            ).join('') || '서버 없음';

        } catch {
            document.getElementById('header-status').textContent = '● 연결 오류';
        }
    }

    // 초기 로드
    loadDashboard();
    checkHealth();
    setInterval(loadDashboard, 10000);
    setInterval(checkHealth, 30000);

    // 메시지 추가
    function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.textContent = text;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addThinking() {
        const div = document.createElement('div');
        div.className = 'thinking';
        div.innerHTML = '<span></span><span></span><span></span>';
        div.id = 'thinking';
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function removeThinking() {
        const el = document.getElementById('thinking');
        if (el) el.remove();
    }

    // 메시지 전송
    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        input.style.height = 'auto';
        sendBtn.disabled = true;

        addMessage(text, 'user');
        addThinking();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text }),
            });
            const data = await res.json();
            removeThinking();

            if (data.error) {
                addMessage('오류: ' + data.error, 'system');
            } else {
                addMessage(data.response, 'assistant');
                // Tool 사용 시 대시보드 갱신
                if (data.tools_used?.length) loadDashboard();
            }
        } catch {
            removeThinking();
            addMessage('네트워크 오류가 발생했습니다.', 'system');
        }

        sendBtn.disabled = false;
        input.focus();
    }

    async function resetChat() {
        await fetch('/api/reset', { method: 'POST' });
        chatArea.innerHTML = '<div class="message system">대화가 초기화되었습니다.</div>';
    }

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 110) + 'px';
    });
</script>

</body>
</html>
